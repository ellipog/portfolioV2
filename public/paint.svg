<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Palette background -->
  <path d="M12 8 C 8 8, 4 12, 4 18 C 4 28, 10 38, 20 40 C 24 41, 30 40, 36 36 C 42 32, 44 26, 44 20 C 44 14, 38 8, 30 8 C 26 8, 24 10, 22 10 C 20 10, 16 8, 12 8 Z" fill="#EEDCA5" stroke="#403010" stroke-width="2" stroke-linejoin="round"/>
  <!-- Palette hole -->
  <ellipse cx="14" cy="20" rx="3" ry="5" fill="#806030" opacity="0.8"/>
  <!-- Paint blobs -->
  <circle cx="28" cy="14" r="4" fill="#FF2020" stroke="#800000" stroke-width="1.5"/>
  <circle cx="36" cy="18" r="4" fill="#20FF20" stroke="#008000" stroke-width="1.5"/>
  <circle cx="36" cy="26" r="4" fill="#2020FF" stroke="#000080" stroke-width="1.5"/>
  <circle cx="28" cy="32" r="4" fill="#FFFF20" stroke="#808000" stroke-width="1.5"/>
  <circle cx="20" cy="32" r="4" fill="#FF20FF" stroke="#800080" stroke-width="1.5"/>
  <!-- Paint Brush -->
  <g transform="rotate(-15 24 24)">
    <!-- Brush Handle -->
    <path d="M6 34 L32 14 L34 16 L8 36 Z" fill="#C08040" stroke="#603010" stroke-width="1.5"/>
    <!-- Metal Ferrule -->
    <path d="M31 13 L35 10 L38 13 L34 16 Z" fill="#D0D0D0" stroke="#808080" stroke-width="1.5"/>
    <!-- Bristles -->
    <path d="M35 10 L41 4 C43 2, 45 4, 43 6 L38 13 Z" fill="#706050" stroke="#403030" stroke-width="1.5"/>
    <!-- Wet paint tip -->
    <path d="M40 5 L41 4 C43 2, 44 3, 43 5 Z" fill="#2020FF"/>
  </g>
</svg>
