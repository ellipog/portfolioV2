<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <!-- Blue gradient for the 'e' -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#29b6f6" />
      <stop offset="35%" stop-color="#0288d1" />
      <stop offset="70%" stop-color="#01579b" />
      <stop offset="100%" stop-color="#002f6c" />
    </linearGradient>
    <!-- Gold gradient for the orbit ring -->
    <linearGradient id="goldGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb300" />
      <stop offset="50%" stop-color="#ffe082" />
      <stop offset="100%" stop-color="#ff8f00" />
    </linearGradient>
    <!-- Shadow filter for 3D depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Back part of the golden orbit ring -->
  <path d="M 5 26 C 2 14, 18 2, 38 12 C 43 15, 42 18, 38 16 C 22 8, 8 18, 10 26 Z" fill="url(#goldGradient)" filter="url(#shadow)"/>

  <!-- The classic blue 'e' shape -->
  <path d="M 28 8 
           C 14 8, 6 18, 6 28 
           C 6 38, 16 43, 28 43 
           C 38 43, 42 37, 42 32 
           C 42 28, 38 27, 36 28 
           C 34 29, 31 34, 27 34 
           C 21 34, 15 29, 15 25
           L 43 25
           C 43 20, 39 8, 28 8 Z
           M 27 15
           C 32 15, 34 20, 34 21
           L 15.5 21
           C 17 17, 21 15, 27 15 Z" 
        fill="url(#blueGradient)" 
        filter="url(#shadow)" />

  <!-- Front part of the golden orbit ring crossing over the 'e' -->
  <path d="M 12 30 C 16 38, 36 46, 44 32 C 47 28, 45 25, 42 27 C 34 38, 18 34, 14 28 Z" fill="url(#goldGradient)" filter="url(#shadow)"/>
</svg>
